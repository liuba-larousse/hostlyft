<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RevPAR KPI Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; min-height: 100vh; padding: 24px; color: #1e293b; }

    .drop-zone { max-width: 500px; margin: 80px auto; border: 2px dashed #cbd5e1; border-radius: 16px; padding: 50px 40px; text-align: center; background: #fff; transition: all 0.2s; cursor: pointer; }
    .drop-zone:hover, .drop-zone.dragging { border-color: #3b82f6; background: #eff6ff; }
    .drop-zone h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: #1e293b; }
    .drop-zone p { color: #64748b; font-size: 14px; }
    .btn { display: inline-block; margin-top: 16px; padding: 10px 24px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn:hover { background: #2563eb; }

    .container { max-width: 1400px; margin: 0 auto; display: none; }
    .container.show { display: block; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .file-name { color: #64748b; font-size: 13px; background: #f1f5f9; padding: 6px 12px; border-radius: 6px; }
    .clear-btn { padding: 6px 14px; background: #fff; border: 1px solid #e2e8f0; color: #64748b; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .clear-btn:hover { background: #f8fafc; color: #1e293b; }

    .metrics-section { margin-bottom: 20px; }
    .metrics-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600; }

    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 12px; }
    .summary-card { background: #fff; border-radius: 10px; padding: 14px 16px; border: 1px solid #e2e8f0; }
    .summary-card.highlight { border-color: #a78bfa; background: #faf5ff; }
    .card-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
    .card-value { font-size: 20px; font-weight: 700; color: #1e293b; }
    .card-value.rental { color: #0891b2; }
    .card-value.total { color: #059669; }
    .card-value.ratio { color: #64748b; }
    .card-value.goal { color: #7c3aed; }
    .card-value.forecast { color: #2563eb; }
    .card-value.actual { color: #059669; }

    .controls-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .controls-left { display: flex; align-items: center; gap: 12px; }
    .goal-input-box { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; }
    .goal-input-box label { font-size: 13px; font-weight: 500; color: #475569; }
    .goal-input { width: 70px; padding: 6px 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; font-weight: 600; text-align: center; }
    .goal-input:focus { outline: none; border-color: #7c3aed; }
    .goal-hint { font-size: 12px; color: #94a3b8; }
    .select-input { padding: 6px 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; font-weight: 500; background: #fff; cursor: pointer; }
    .select-input:focus { outline: none; border-color: #3b82f6; }
    .quality-badge { display: inline-block; padding: 4px 8px; background: #ecfdf5; color: #059669; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 4px; }

    .tabs { display: flex; gap: 4px; background: #fff; padding: 4px; border-radius: 10px; border: 1px solid #e2e8f0; }
    .tab { padding: 8px 20px; border: none; background: transparent; color: #64748b; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
    .tab:hover { color: #1e293b; }
    .tab.active { background: #3b82f6; color: white; }

    .copy-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: #fff; border: 1px solid #e2e8f0; color: #475569; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
    .copy-btn:hover { background: #f8fafc; border-color: #cbd5e1; color: #1e293b; }
    .copy-btn.copied { background: #ecfdf5; border-color: #10b981; color: #059669; }
    .copy-btn svg { width: 16px; height: 16px; }

    .table-wrap { background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }

    th { background: #f8fafc; padding: 10px 8px; text-align: center; font-weight: 600; color: #475569; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
    th:first-child { text-align: left; padding-left: 14px; position: sticky; left: 0; background: #f8fafc; z-index: 1; }
    th.section-port { background: #ecfdf5; color: #047857; }
    th.section-mkt { background: #eff6ff; color: #1d4ed8; }
    th.section-goal { background: #f5f3ff; color: #6d28d9; }
    th.section-actual { background: #fef3c7; color: #b45309; }
    th.section-ly { background: #f1f5f9; color: #475569; }

    td { padding: 8px; text-align: center; border-bottom: 1px solid #f1f5f9; color: #334155; }
    td:first-child { text-align: left; padding-left: 14px; font-weight: 600; color: #1e293b; position: sticky; left: 0; background: #fff; z-index: 1; }
    tr:hover td { background: #fafbfc; }
    tr:hover td:first-child { background: #fafbfc; }
    tr:last-child td { border-bottom: none; }

    .total-row td { background: #f8fafc !important; font-weight: 700; border-top: 2px solid #e2e8f0; color: #1e293b; }

    .driver { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 600; letter-spacing: 0.3px; }
    .driver-occ { background: #dcfce7; color: #166534; }
    .driver-adr { background: #fef3c7; color: #92400e; }
    .driver-na { background: #f1f5f9; color: #94a3b8; }

    .pos { color: #059669; }
    .neg { color: #dc2626; }
    .mult { color: #2563eb; font-weight: 500; }
    .forecast { color: #2563eb; font-weight: 600; }
    .goal { color: #7c3aed; font-weight: 600; }
    .actual { color: #059669; font-weight: 600; }
    .muted { color: #94a3b8; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

<div class="drop-zone" id="dropZone">
  <h1>📊 RevPAR KPI Calculator</h1>
  <p>Drop your metrics report (.xlsx, .csv)</p>
  <button class="btn" onclick="document.getElementById('fileInput').click()">Browse Files</button>
  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none">
</div>

<div class="container" id="container">
  <div class="header">
    <h1>📊 RevPAR KPI Calculator</h1>
    <div class="header-right">
      <span class="file-name" id="fileName"></span>
      <button class="clear-btn" onclick="clearData()">✕ Clear</button>
    </div>
  </div>

  <div class="metrics-section">
    <div class="metrics-label">Revenue Overview</div>
    <div class="summary-grid">
      <div class="summary-card">
        <div class="card-label">Rental Revenue LY</div>
        <div class="card-value rental" id="sumRentalLY">$0</div>
      </div>
      <div class="summary-card">
        <div class="card-label">Total Revenue LY</div>
        <div class="card-value total" id="sumTotalLY">$0</div>
      </div>
      <div class="summary-card">
        <div class="card-label">Rental / Total Ratio</div>
        <div class="card-value ratio" id="sumRatio">0%</div>
      </div>
      <div class="summary-card">
        <div class="card-label">Portfolio Premium</div>
        <div class="card-value" id="sumPremium">0%</div>
      </div>
      <div class="summary-card highlight">
        <div class="card-label">Target Rental Rev</div>
        <div class="card-value goal" id="sumTargetRental">$0</div>
      </div>
      <div class="summary-card highlight">
        <div class="card-label">Target Total Rev</div>
        <div class="card-value goal" id="sumTargetTotal">$0</div>
      </div>
      <div class="summary-card">
        <div class="card-label">Actual Rental Rev</div>
        <div class="card-value actual" id="sumActualRental">$0</div>
      </div>
      <div class="summary-card">
        <div class="card-label">Target vs Actual</div>
        <div class="card-value" id="sumVariance">—</div>
      </div>
    </div>
  </div>

  <div class="controls-row">
    <div class="controls-left">
      <div class="tabs">
        <button class="tab active" data-tab="summary">Summary</button>
        <button class="tab" data-tab="portfolio">Portfolio Details</button>
        <button class="tab" data-tab="market">Market Details</button>
      </div>
    </div>
    <div class="controls-left">
      <div class="goal-input-box">
        <label>Add'l Goal:</label>
        <input type="number" class="goal-input" id="goalInput" value="0" min="0" max="100" step="1">
        <span class="goal-hint">% on top</span>
      </div>
      <div class="goal-input-box">
        <label>Forecast Base:</label>
        <select class="select-input" id="forecastBase">
          <option value="ly">Portfolio LY (+ Market fallback)</option>
          <option value="market">Market RevPAR only</option>
        </select>
      </div>
      <div class="goal-input-box" id="qualityBox" style="display:none;">
        <label>Quality Tier:</label>
        <select class="select-input" id="qualityTier">
          <option value="actual">Actual Premium</option>
          <option value="0">Medium (0%)</option>
          <option value="0.125">Med-High (+12.5%)</option>
          <option value="0.25">High (+25%)</option>
          <option value="0.40">Luxury+ (+40%)</option>
        </select>
        <span class="quality-badge" id="qualityBadge"></span>
      </div>
      <button class="copy-btn" id="copyBtn" onclick="copyTable()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
        </svg>
        <span id="copyText">Copy Table</span>
      </button>
      <button class="copy-btn" onclick="downloadPDF()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        <span>Download PDF</span>
      </button>
    </div>
  </div>

  <div class="tab-content active" id="tab-summary">
    <div class="table-wrap">
      <table id="summaryTable"></table>
    </div>
  </div>

  <div class="tab-content" id="tab-portfolio">
    <div class="table-wrap">
      <table id="portfolioTable"></table>
    </div>
  </div>

  <div class="tab-content" id="tab-market">
    <div class="table-wrap">
      <table id="marketTable"></table>
    </div>
  </div>
</div>

<script>
const DAYS = {'01':31,'02':28,'03':31,'04':30,'05':31,'06':30,'07':31,'08':31,'09':30,'10':31,'11':30,'12':31};
const MONTHS = {'01':'Jan','02':'Feb','03':'Mar','04':'Apr','05':'May','06':'Jun','07':'Jul','08':'Aug','09':'Sep','10':'Oct','11':'Nov','12':'Dec'};

let data = [];
let goalPct = 0;
let currentTab = 'summary';
let forecastBase = 'ly';
let qualityOffset = 0;
let calculatedPremium = 0;
let qualityMode = 'actual';
let premiumSource = 'TY';

const dropZone = document.getElementById('dropZone');
const container = document.getElementById('container');
const fileInput = document.getElementById('fileInput');
const goalInput = document.getElementById('goalInput');
const forecastBaseSelect = document.getElementById('forecastBase');
const qualityTierSelect = document.getElementById('qualityTier');
const qualityBox = document.getElementById('qualityBox');
const qualityBadge = document.getElementById('qualityBadge');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragging'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });
goalInput.addEventListener('input', e => { goalPct = parseFloat(e.target.value) || 0; render(); });
forecastBaseSelect.addEventListener('change', e => {
  forecastBase = e.target.value;
  qualityBox.style.display = forecastBase === 'market' ? 'flex' : 'none';
  render();
});
qualityTierSelect.addEventListener('change', e => {
  qualityMode = e.target.value;
  if (qualityMode === 'actual') {
    qualityOffset = calculatedPremium;
  } else {
    qualityOffset = parseFloat(e.target.value) || 0;
  }
  render();
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    document.getElementById('tab-' + currentTab).classList.add('active');
  });
});

function handleFile(file) {
  document.getElementById('fileName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    data = processData(XLSX.utils.sheet_to_json(ws));
    render();
  };
  reader.readAsArrayBuffer(file);
}

function processData(raw) {
  return raw.map(r => {
    const m = (r['Year & Month']||'').match(/\d{4}-(\d{2})/);
    const mn = m?m[1]:'01';
    const days = DAYS[mn]||30;

    // Portfolio
    const pOccTY=+r['Occupancy %']||0, pOccSTLY=+r['Occupancy % STLY']||0;
    const pAdrTY=+r['Rental ADR']||0, pAdrSTLY=+r['Rental ADR STLY']||0;
    const pRevparTY=+r['Rental RevPAR']||0, pRevparSTLY=+r['Rental RevPAR STLY']||0, pRevparLY=+r['Rental RevPAR LY']||0;
    const actRental=+r['Rental Revenue']||0;
    const actTotal=+r['Total Revenue']||0;
    const rentalLY=+r['Rental Revenue LY']||0;
    const totalLY=+r['Total Revenue LY']||0;

    const pOccChg = pOccSTLY>0&&pOccTY>0 ? (pOccTY-pOccSTLY)/pOccSTLY : null;
    const pAdrChg = pAdrSTLY>0&&pAdrTY>0 ? (pAdrTY-pAdrSTLY)/pAdrSTLY : null;
    const pRevparChg = pRevparSTLY>0&&pRevparTY>0 ? (pRevparTY-pRevparSTLY)/pRevparSTLY : null;

    const pOccCon = pOccSTLY>0&&pOccTY>0 ? (pOccTY/100-pOccSTLY/100)*pAdrSTLY : null;
    const pAdrCon = pAdrSTLY>0&&pAdrTY>0 ? (pAdrTY-pAdrSTLY)*(pOccSTLY/100) : null;
    const pDrv = pOccCon!==null&&pAdrCon!==null ? (Math.abs(pOccCon)>Math.abs(pAdrCon)?'OCC':'ADR') : null;

    // Market
    const mOccTY=+r['Market Occupancy %']||0, mOccSTLY=+r['Market Occupancy % STLY']||0;
    const mAdrTY=+r['Market ADR']||0, mAdrSTLY=+r['Market ADR STLY']||0;
    const mRevparTY=+r['Market RevPAR']||0, mRevparSTLY=+r['Market RevPAR STLY']||0, mRevparLY=+r['Market RevPAR LY']||0;

    const mOccChg = mOccSTLY>0&&mOccTY>0 ? (mOccTY-mOccSTLY)/mOccSTLY : null;
    const mAdrChg = mAdrSTLY>0&&mAdrTY>0 ? (mAdrTY-mAdrSTLY)/mAdrSTLY : null;
    const mRevparChg = mRevparSTLY>0&&mRevparTY>0 ? (mRevparTY-mRevparSTLY)/mRevparSTLY : null;

    const mOccCon = mOccSTLY>0&&mOccTY>0 ? (mOccTY/100-mOccSTLY/100)*mAdrSTLY : null;
    const mAdrCon = mAdrSTLY>0&&mAdrTY>0 ? (mAdrTY-mAdrSTLY)*(mOccSTLY/100) : null;
    const mDrv = mOccCon!==null&&mAdrCon!==null ? (Math.abs(mOccCon)>Math.abs(mAdrCon)?'OCC':'ADR') : null;
    const mMult = mRevparChg!==null ? 1+mRevparChg : null;

    // Forecast
    const fRental = pRevparLY>0&&mMult ? pRevparLY*mMult*days : null;

    return {
      ms: MONTHS[mn], days,
      pOccTY, pOccSTLY, pOccChg,
      pAdrTY, pAdrSTLY, pAdrChg,
      pRevparTY, pRevparSTLY, pRevparLY, pRevparChg,
      pOccCon, pAdrCon, pDrv,
      mOccTY, mOccSTLY, mOccChg,
      mAdrTY, mAdrSTLY, mAdrChg,
      mRevparTY, mRevparSTLY, mRevparLY, mRevparChg,
      mOccCon, mAdrCon, mDrv, mMult,
      fRental, actRental, actTotal, rentalLY, totalLY
    };
  });
}

function render() {
  dropZone.style.display = 'none';
  container.classList.add('show');

  // Calculate Portfolio Premium from data
  // Premium LY = Avg Portfolio RevPAR LY / Avg Market RevPAR LY - 1
  // IMPORTANT: Only use months where BOTH Portfolio AND Market LY have values
  const monthsWithBothLY = data.filter(r => r.pRevparLY > 0 && r.mRevparLY > 0);

  let calculatedPremiumLY = 0;
  if (monthsWithBothLY.length > 0) {
    const avgPortRevparLY = monthsWithBothLY.reduce((a,r) => a + r.pRevparLY, 0) / monthsWithBothLY.length;
    const avgMktRevparLY = monthsWithBothLY.reduce((a,r) => a + r.mRevparLY, 0) / monthsWithBothLY.length;
    if (avgMktRevparLY > 0) {
      calculatedPremiumLY = (avgPortRevparLY / avgMktRevparLY) - 1;
    }
  }

  calculatedPremium = calculatedPremiumLY;
  premiumSource = monthsWithBothLY.length > 0 ? 'LY' : '';

  // Update quality badge to show calculated premium (LY)
  const premiumPct = (calculatedPremium * 100).toFixed(1);
  qualityBadge.textContent = (calculatedPremium >= 0 ? '+' : '') + premiumPct + '% (LY)';
  qualityBadge.style.background = calculatedPremium >= 0 ? '#ecfdf5' : '#fef2f2';
  qualityBadge.style.color = calculatedPremium >= 0 ? '#059669' : '#dc2626';

  // Set qualityOffset based on mode
  if (qualityMode === 'actual') {
    qualityOffset = calculatedPremium;
  }

  // Calculate Target Revenue (Forecast × Goal combined)
  // Formula: Base RevPAR LY × Market Multiplier × (1 + Goal%) × Days
  // All modes use LY as base and apply Market Mult for consistency
  const calcTarget = (r) => {
    const goalMult = 1 + (goalPct / 100);

    if (forecastBase === 'ly') {
      // Primary: Portfolio RevPAR LY × Market Multiplier × Goal Multiplier
      if (r.pRevparLY > 0 && r.mMult) {
        return r.pRevparLY * r.mMult * goalMult * r.days;
      }
      // Fallback: Market RevPAR LY × Market Mult × (1 + Premium) × Goal Multiplier
      if (r.mRevparLY > 0 && r.mMult) {
        return r.mRevparLY * r.mMult * (1 + calculatedPremium) * goalMult * r.days;
      }
      return null;
    } else {
      // Market mode: Market RevPAR LY × Market Mult × (1 + Quality Offset) × Goal Multiplier
      if (r.mRevparLY > 0 && r.mMult) {
        return r.mRevparLY * r.mMult * (1 + qualityOffset) * goalMult * r.days;
      }
      return null;
    }
  };

  // Store calculated values and track if fallback was used
  data.forEach(r => {
    r.usingFallback = forecastBase === 'ly' && r.pRevparLY <= 0;
    r.targetRev = calcTarget(r);
  });

  const totRentalLY = data.reduce((s,r)=>s+(r.rentalLY||0),0);
  const totTotalLY = data.reduce((s,r)=>s+(r.totalLY||0),0);
  const ratio = totTotalLY > 0 ? (totRentalLY / totTotalLY) * 100 : 0;
  const totTargetRental = data.reduce((s,r)=>s+(r.targetRev||0),0);
  const totTargetTotal = ratio > 0 ? totTargetRental / (ratio/100) : 0;
  const totActRental = data.reduce((s,r)=>s+(r.actRental||0),0);
  const variance = totTargetRental > 0 ? ((totActRental - totTargetRental) / totTargetRental) * 100 : 0;

  document.getElementById('sumRentalLY').textContent = '$' + Math.round(totRentalLY).toLocaleString();
  document.getElementById('sumTotalLY').textContent = '$' + Math.round(totTotalLY).toLocaleString();
  document.getElementById('sumRatio').textContent = ratio.toFixed(1) + '%';

  // Update Portfolio Premium display (LY - used for calculations)
  const premiumPctDisplay = (calculatedPremium * 100).toFixed(1);
  const premiumEl = document.getElementById('sumPremium');
  premiumEl.textContent = (calculatedPremium >= 0 ? '+' : '') + premiumPctDisplay + '%';
  premiumEl.style.color = calculatedPremium >= 0 ? '#059669' : '#dc2626';

  // Update premium label
  const premiumLabelEl = document.querySelector('#sumPremium').parentElement.querySelector('.card-label');
  premiumLabelEl.textContent = 'Portfolio Premium (LY)';

  document.getElementById('sumTargetRental').textContent = '$' + Math.round(totTargetRental).toLocaleString();
  document.getElementById('sumTargetTotal').textContent = '$' + Math.round(totTargetTotal).toLocaleString();
  document.getElementById('sumActualRental').textContent = '$' + Math.round(totActRental).toLocaleString();

  // Update variance display
  const varianceEl = document.getElementById('sumVariance');
  if (totActRental > 0 && totTargetRental > 0) {
    varianceEl.textContent = (variance >= 0 ? '+' : '') + variance.toFixed(1) + '%';
    varianceEl.style.color = variance >= 0 ? '#059669' : '#dc2626';
  } else {
    varianceEl.textContent = '—';
    varianceEl.style.color = '#64748b';
  }

  renderSummaryTable(totTargetRental, totActRental);
  renderPortfolioTable();
  renderMarketTable();
}

function renderSummaryTable(totT, totA) {
  const cur = v => v!==null ? '$'+Math.round(v).toLocaleString() : '—';
  const mult = v => v!==null ? v.toFixed(3)+'x' : '—';
  const driver = d => d ? `<span class="driver driver-${d.toLowerCase()}">${d}</span>` : '<span class="driver driver-na">—</span>';

  const goalLabel = goalPct > 0 ? ` +${goalPct}%` : '';

  let html = `<thead><tr>
    <th>Month</th>
    <th class="section-port">RevPAR TY</th>
    <th class="section-port">Port Driver</th>
    <th class="section-mkt">Mkt Driver</th>
    <th class="section-mkt">${forecastBase === 'ly' ? 'Mkt Mult' : 'Premium'}</th>
    <th class="section-goal">Target Rev${goalLabel}</th>
    <th class="section-actual">Actual Rev</th>
    <th>Variance</th>
  </tr></thead><tbody>`;

  const getQualityLabel = () => {
    if (qualityMode === 'actual') {
      const pct = (calculatedPremium * 100).toFixed(1);
      return (calculatedPremium >= 0 ? '+' : '') + pct + '%';
    }
    const labels = {'0':'0%', '0.125':'+12.5%', '0.25':'+25%', '0.4':'+40%'};
    return labels[qualityOffset.toString()] || '0%';
  };

  data.forEach(r => {
    const multDisplay = forecastBase === 'ly' ? mult(r.mMult) : getQualityLabel();
    const fallbackClass = r.usingFallback ? ' style="font-style:italic;"' : '';
    const fallbackNote = r.usingFallback ? '*' : '';

    // Calculate variance for each row
    let varianceDisplay = '—';
    if (r.targetRev && r.actRental > 0) {
      const rowVar = ((r.actRental - r.targetRev) / r.targetRev) * 100;
      varianceDisplay = `<span class="${rowVar >= 0 ? 'pos' : 'neg'}">${rowVar >= 0 ? '+' : ''}${rowVar.toFixed(1)}%</span>`;
    }

    html += `<tr>
      <td>${r.ms}</td>
      <td class="muted">${r.pRevparTY>0?'$'+r.pRevparTY.toFixed(0):'—'}</td>
      <td>${driver(r.pDrv)}</td>
      <td>${driver(r.mDrv)}</td>
      <td class="mult">${multDisplay}</td>
      <td class="goal"${fallbackClass}>${cur(r.targetRev)}${fallbackNote}</td>
      <td class="actual">${r.actRental>0?cur(r.actRental):'—'}</td>
      <td>${varianceDisplay}</td>
    </tr>`;
  });

  // Total variance
  let totVarDisplay = '—';
  if (totT > 0 && totA > 0) {
    const totVar = ((totA - totT) / totT) * 100;
    totVarDisplay = `<span class="${totVar >= 0 ? 'pos' : 'neg'}">${totVar >= 0 ? '+' : ''}${totVar.toFixed(1)}%</span>`;
  }

  html += `<tr class="total-row">
    <td>TOTAL</td><td></td><td></td><td></td><td></td>
    <td class="goal">${cur(totT)}</td>
    <td class="actual">${cur(totA)}</td>
    <td>${totVarDisplay}</td>
  </tr></tbody>`;

  // Add footnote if any rows used fallback
  const hasFallback = data.some(r => r.usingFallback && r.targetRev);
  if (hasFallback) {
    html += `<tfoot><tr><td colspan="8" style="font-size:10px;color:#64748b;padding-top:8px;font-style:italic;">* Using Market RevPAR LY × Mkt Mult × Premium (Portfolio RevPAR LY not available)</td></tr></tfoot>`;
  }

  document.getElementById('summaryTable').innerHTML = html;
}

function copyTable() {
  let tsv = '';

  const getQualityLabel = () => {
    if (qualityMode === 'actual') {
      const pct = (calculatedPremium * 100).toFixed(1);
      return calculatedPremium >= 0 ? `+${pct}%` : `${pct}%`;
    }
    const labels = {'0':'0%', '0.125':'+12.5%', '0.25':'+25%', '0.4':'+40%'};
    return labels[qualityOffset.toString()] || '0%';
  };

  if (currentTab === 'summary') {
    const multLabel = forecastBase === 'ly' ? 'Mkt Mult' : 'Premium';
    const goalLabel = goalPct > 0 ? ` +${goalPct}%` : '';
    tsv = `Month\tRevPAR TY\tPort Driver\tMkt Driver\t${multLabel}\tTarget Rev${goalLabel}\tActual Rev\tVariance\n`;
    data.forEach(r => {
      const multVal = forecastBase === 'ly' ? (r.mMult?r.mMult.toFixed(3):'') : getQualityLabel();
      let variance = '';
      if (r.targetRev && r.actRental > 0) {
        const rowVar = ((r.actRental - r.targetRev) / r.targetRev) * 100;
        variance = rowVar.toFixed(1) + '%';
      }
      tsv += `${r.ms}\t${r.pRevparTY>0?r.pRevparTY.toFixed(0):''}\t${r.pDrv||''}\t${r.mDrv||''}\t${multVal}\t${r.targetRev?Math.round(r.targetRev):''}\t${r.actRental>0?Math.round(r.actRental):''}\t${variance}\n`;
    });
    const totT = data.reduce((s,r)=>s+(r.targetRev||0),0);
    const totA = data.reduce((s,r)=>s+(r.actRental||0),0);
    let totVar = '';
    if (totT > 0 && totA > 0) {
      totVar = (((totA - totT) / totT) * 100).toFixed(1) + '%';
    }
    tsv += `TOTAL\t\t\t\t\t${Math.round(totT)}\t${Math.round(totA)}\t${totVar}\n`;
  }
  else if (currentTab === 'portfolio') {
    tsv = 'Month\tOcc TY\tOcc STLY\tOcc Δ\tADR TY\tADR STLY\tADR Δ\tRevPAR TY\tRevPAR STLY\tRevPAR Δ\tOcc Contrib\tADR Contrib\tDriver\n';
    data.forEach(r => {
      tsv += `${r.ms}\t${r.pOccTY>0?r.pOccTY.toFixed(1):''}\t${r.pOccSTLY>0?r.pOccSTLY.toFixed(1):''}\t${r.pOccChg!==null?(r.pOccChg*100).toFixed(1):''}\t${r.pAdrTY>0?r.pAdrTY.toFixed(2):''}\t${r.pAdrSTLY>0?r.pAdrSTLY.toFixed(2):''}\t${r.pAdrChg!==null?(r.pAdrChg*100).toFixed(1):''}\t${r.pRevparTY>0?r.pRevparTY.toFixed(2):''}\t${r.pRevparSTLY>0?r.pRevparSTLY.toFixed(2):''}\t${r.pRevparChg!==null?(r.pRevparChg*100).toFixed(1):''}\t${r.pOccCon!==null?r.pOccCon.toFixed(2):''}\t${r.pAdrCon!==null?r.pAdrCon.toFixed(2):''}\t${r.pDrv||''}\n`;
    });
  }
  else if (currentTab === 'market') {
    tsv = 'Month\tOcc TY\tOcc STLY\tOcc Δ\tADR TY\tADR STLY\tADR Δ\tRevPAR TY\tRevPAR STLY\tRevPAR Δ\tOcc Contrib\tADR Contrib\tDriver\tMultiplier\n';
    data.forEach(r => {
      tsv += `${r.ms}\t${r.mOccTY>0?r.mOccTY.toFixed(1):''}\t${r.mOccSTLY>0?r.mOccSTLY.toFixed(1):''}\t${r.mOccChg!==null?(r.mOccChg*100).toFixed(1):''}\t${r.mAdrTY>0?r.mAdrTY.toFixed(2):''}\t${r.mAdrSTLY>0?r.mAdrSTLY.toFixed(2):''}\t${r.mAdrChg!==null?(r.mAdrChg*100).toFixed(1):''}\t${r.mRevparTY>0?r.mRevparTY.toFixed(2):''}\t${r.mRevparSTLY>0?r.mRevparSTLY.toFixed(2):''}\t${r.mRevparChg!==null?(r.mRevparChg*100).toFixed(1):''}\t${r.mOccCon!==null?r.mOccCon.toFixed(2):''}\t${r.mAdrCon!==null?r.mAdrCon.toFixed(2):''}\t${r.mDrv||''}\t${r.mMult?r.mMult.toFixed(3):''}\n`;
    });
  }

  // Fallback copy method using textarea
  const textarea = document.createElement('textarea');
  textarea.value = tsv;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  textarea.style.top = '0';
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  let success = false;
  try {
    success = document.execCommand('copy');
  } catch (err) {
    console.error('Copy failed:', err);
  }

  document.body.removeChild(textarea);

  if (success) {
    const btn = document.getElementById('copyBtn');
    const txt = document.getElementById('copyText');
    btn.classList.add('copied');
    txt.textContent = '✓ Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      txt.textContent = 'Copy Table';
    }, 2000);
  } else {
    alert('Copy failed. Please try selecting the table manually.');
  }
}
